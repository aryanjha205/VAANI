<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VAANI - Voice of Connection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script>
        // Apply theme immediately to prevent flashing
        if (localStorage.getItem('dark_mode') === 'true') {
            document.documentElement.classList.add('dark-theme');
            // Wait for DOM to add to body too
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-theme'));
        }

        // Global Broken Image Handler
        window.addEventListener('error', function (e) {
            if (e.target.tagName === 'IMG' && (e.target.classList.contains('user-avatar') || e.target.id === 'my-profile-pic')) {
                const name = e.target.alt || 'User';
                e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff`;
            }
        }, true);
    </script>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#764ba2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VAANI">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        /* Premium Immersive Splash Screen */
        #vaani-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* Atmospheric Background Glow */
        #vaani-splash::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #764ba2;
            filter: blur(150px);
            opacity: 0.3;
        }

        .splash-logo-container {
            position: relative;
            z-index: 10001;
            transform: scale(1);
            opacity: 1;
        }

        .splash-logo {
            width: 100%;
            height: auto;
            max-width: 400px;
            object-fit: contain;
            filter: drop-shadow(0 20px 50px rgba(118, 75, 162, 0.5));
        }

        .splash-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 3rem;
            margin-top: 40px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 15px;
            opacity: 1;
            transform: translateY(0);
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #vaani-splash.fade-out {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
            /* Zoom effect on completion */
        }
    </style>
</head>

<body class="{% if session.get('dark_mode') %}dark-theme{% endif %}">
    <!-- Immersive Splash Screen -->
    <div id="vaani-splash">
        <div class="splash-logo-container">
            <img src="/static/img/icon-512.png" alt="VAANI" class="splash-logo">
        </div>
        <div class="splash-text">VAANI</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Splash Screen dismiss
        window.addEventListener('load', () => {
            const splash = document.getElementById('vaani-splash');
            if (splash) {
                setTimeout(() => {
                    splash.classList.add('fade-out');
                }, 1000);
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}")
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>

</html>
