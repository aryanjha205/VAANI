<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAANI - Voice of Connection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script>
        // Apply theme immediately to prevent flashing
        if (localStorage.getItem('dark_mode') === 'true') {
            document.documentElement.classList.add('dark-theme');
            // Wait for DOM to add to body too
            document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-theme'));
        }
    </script>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#764ba2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VAANI">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        /* Premium Splash Screen */
        #vaani-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .dark-theme #vaani-splash {
            background: #0f172a;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            animation: splashPulse 2s infinite ease-in-out;
            margin-bottom: 24px;
        }

        @keyframes splashPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            }
        }

        .splash-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #764ba2, #667eea);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        #vaani-splash.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* PWA Install Prompt */
        #pwa-install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 9998;
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: slideUp 0.5s ease-out;
        }

        .dark-theme #pwa-install-prompt {
            background: #1e293b;
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 100px);
                opacity: 0;
            }

            to {
                transform: translateX(-50%, 0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="{% if session.get('dark_mode') %}dark-theme{% endif %}">
    <!-- Splash Screen -->
    <div id="vaani-splash">
        <img src="/static/img/icon-192.png" alt="VAANI" class="splash-logo">
        <div class="splash-text">VAANI</div>
    </div>

    <!-- PWA Install Button -->
    <div id="pwa-install-prompt">
        <img src="/static/img/icon-192.png" width="32" height="32" class="rounded">
        <span class="small fw-bold">Install VAANI on your device</span>
        <button id="pwa-install-btn" class="btn btn-primary btn-sm rounded-pill px-3">Install</button>
        <button id="pwa-close-btn" class="btn-close ms-2" style="font-size: 0.6rem;"></button>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Splash Screen dismiss
        window.addEventListener('load', () => {
            const splash = document.getElementById('vaani-splash');
            setTimeout(() => {
                splash.classList.add('fade-out');
            }, 1000);
        });

        // PWA Installation Logic
        let deferredPrompt;
        const installPrompt = document.getElementById('pwa-install-prompt');
        const installBtn = document.getElementById('pwa-install-btn');
        const closeBtn = document.getElementById('pwa-close-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Only show if user hasn't seen it recently
            if (!localStorage.getItem('pwa_prompt_dismissed')) {
                installPrompt.style.display = 'flex';
            }
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installPrompt.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        closeBtn.addEventListener('click', () => {
            installPrompt.style.display = 'none';
            localStorage.setItem('pwa_prompt_dismissed', 'true');
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}")
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>

</html>
