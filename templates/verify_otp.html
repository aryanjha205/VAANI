{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='img/icon-512.png') }}" alt="VAANI Logo" class="auth-logo mb-3">
            <h2 class="auth-title">Verify Email</h2>
            <p class="text-muted">A 6-digit OTP has been sent to<br><strong>{{ email }}</strong></p>
        </div>

        <form method="POST" action="{{ url_for('verify_otp') }}">
            <input type="hidden" name="email" value="{{ email }}">

            <div class="input-group-custom mb-4">
                <i class="fas fa-key"></i>
                <input type="text" name="otp" maxlength="6" pattern="\d{6}" required placeholder="Enter 6-digit OTP"
                    class="text-center fw-bold fs-4" autofocus>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-auth btn-lg">Verify & Create Account</button>
            </div>
        </form>

        <div class="mt-4 text-center auth-footer-text">
            <span>Didn't receive the code?</span>
            <button id="resend-btn" class="btn btn-link auth-link p-0 align-baseline border-0">Resend OTP</button>
            <span id="timer" class="text-muted d-none">in <span id="seconds">30</span>s</span>
        </div>

        <script>
            const resendBtn = document.getElementById('resend-btn');
            const timerEl = document.getElementById('timer');
            const secondsEl = document.getElementById('seconds');
            let countdown = 30;

            resendBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                resendBtn.disabled = true;

                const formData = new FormData();
                formData.append('email', '{{ email }}');

                const response = await fetch('{{ url_for("resend_otp") }}', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                alert(data.message);

                if (data.success) {
                    startTimer();
                } else {
                    resendBtn.disabled = false;
                }
            });

            function startTimer() {
                resendBtn.classList.add('d-none');
                timerEl.classList.remove('d-none');
                countdown = 30;

                const interval = setInterval(() => {
                    countdown--;
                    secondsEl.innerText = countdown;
                    if (countdown <= 0) {
                        clearInterval(interval);
                        resendBtn.classList.remove('d-none');
                        timerEl.classList.add('d-none');
                        resendBtn.disabled = false;
                    }
                }, 1000);
            }
        </script>
    </div>
</div>
{% endblock %}
