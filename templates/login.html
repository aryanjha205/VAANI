{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='img/icon-512.png') }}" alt="VAANI Logo" class="auth-logo mb-3">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="text-muted">Login to continue your futuristic chats</p>
        </div>

        <form method="POST">
            <div class="input-group-custom mb-3">
                <i class="fas fa-user"></i>
                <input type="text" name="username" required placeholder="Username">
            </div>

            <div class="input-group-custom mb-4">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" required placeholder="Password">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-auth btn-lg">Login</button>
            </div>
        </form>

        <p class="mt-4 text-center auth-footer-text">
            Don't have an account? <a href="{{ url_for('signup') }}" class="auth-link">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
