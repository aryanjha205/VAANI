{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='img/icon-512.png') }}" alt="VAANI Logo" class="auth-logo mb-3">
            <h2 class="auth-title">Join VAANI</h2>
            <p class="text-muted">Create your futuristic communication profile</p>
        </div>

        <form method="POST">
            <div class="input-group-custom mb-3">
                <i class="fas fa-user"></i>
                <input type="text" name="username" required placeholder="Username">
            </div>

            <div class="input-group-custom mb-3">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" required placeholder="Email Address">
            </div>

            <div class="input-group-custom mb-4">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" required placeholder="Create Password">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-auth btn-lg">Sign Up</button>
            </div>
        </form>

        <p class="mt-4 text-center auth-footer-text">
            Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Login</a>
        </p>
    </div>
</div>
{% endblock %}
